services:
  agendamentos-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: agendamentos-api:prod
    container_name: agendamentos-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      TRUST_PROXY: ${TRUST_PROXY:-1}
      BODY_LIMIT: ${BODY_LIMIT:-1mb}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_SSL: ${DB_SSL:-false}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-true}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatório}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN obrigatório}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS:-900000}
      LOGIN_RATE_LIMIT_IP_MAX: ${LOGIN_RATE_LIMIT_IP_MAX:-30}
      LOGIN_RATE_LIMIT_EMAIL_MAX: ${LOGIN_RATE_LIMIT_EMAIL_MAX:-10}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    expose:
      - "5000"
    networks:
      - agendamentos-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  agendamentos-site:
    build:
      context: .
      dockerfile: site/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-Sistema de Agendamento}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
    image: agendamentos-site:prod
    container_name: agendamentos-site
    restart: unless-stopped
    depends_on:
      agendamentos-api:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - agendamentos-internal
      - proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/cache/nginx:size=64m,mode=1777
      - /var/run:size=16m,mode=1777
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  agendamentos-internal:
    driver: bridge
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}
