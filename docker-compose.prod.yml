version: "3.8"

services:
  api:
    image: ghcr.io/braltec/airesolve-api:v1.0.0
    environment:
      NODE_ENV: production
      PORT: 5000
      TRUST_PROXY: ${TRUST_PROXY:-1}
      BODY_LIMIT: ${BODY_LIMIT:-1mb}
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL: ${DB_SSL:-false}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-true}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN}
    networks:
      - network_swarm_public
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 120s
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      rollback_config:
        order: stop-first
        parallelism: 1

  frontend:
    image: ghcr.io/braltec/airesolve-frontend:v1.0.0
    networks:
      - network_swarm_public
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/cache/nginx:size=64m,mode=1777
      - /var/run:size=16m,mode=1777
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 120s
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      rollback_config:
        order: stop-first
        parallelism: 1

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public
